<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1d23"/>
      <stop offset="100%" stop-color="#12141a"/>
    </linearGradient>
    <linearGradient id="c-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="80" height="80" rx="18"/>
    </clipPath>
  </defs>

  <rect width="80" height="80" rx="18" fill="url(#bg-grad)" stroke="url(#border-grad)" stroke-width="1.5"/>

  <!-- Circuit traces -->
  <g clip-path="url(#clip)" opacity="0.15">
    <line x1="4" y1="20" x2="76" y2="20" stroke="#818cf8" stroke-width="0.7"/>
    <line x1="4" y1="40" x2="76" y2="40" stroke="#818cf8" stroke-width="0.7"/>
    <line x1="4" y1="60" x2="76" y2="60" stroke="#818cf8" stroke-width="0.7"/>
    <line x1="20" y1="4" x2="20" y2="76" stroke="#fb923c" stroke-width="0.7"/>
    <line x1="40" y1="4" x2="40" y2="76" stroke="#818cf8" stroke-width="0.7"/>
    <line x1="60" y1="4" x2="60" y2="76" stroke="#fb923c" stroke-width="0.7"/>
    <circle cx="20" cy="20" r="2" fill="#818cf8"/>
    <circle cx="60" cy="20" r="2" fill="#fb923c"/>
    <circle cx="20" cy="60" r="2" fill="#fb923c"/>
    <circle cx="60" cy="60" r="2" fill="#818cf8"/>
    <circle cx="40" cy="40" r="2.5" fill="#6366f1"/>
  </g>

  <!-- The "C" -->
  <path d="M55 24C51.5 18 45 14.5 38 14.5C26 14.5 17 25 17 40C17 55 26 65.5 38 65.5C45 65.5 51.5 62 55 56"
        stroke="url(#c-grad)" stroke-width="5.5" stroke-linecap="round" fill="none"/>

  <!-- Orange accents -->
  <path d="M55 24C56.5 26.5 57.5 29.5 58 33" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M55 56C56.5 53.5 57.5 50.5 58 47" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- Nodes -->
  <circle cx="55" cy="24" r="3" fill="#818cf8"/>
  <circle cx="55" cy="56" r="3" fill="#fb923c"/>
  <circle cx="17" cy="40" r="2.5" fill="#6366f1"/>
</svg>
